<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Head -->
  <circle cx="100" cy="35" r="18" fill="#FFCC80" stroke="#333" stroke-width="2"/>
  <!-- Neck -->
  <line x1="100" y1="53" x2="100" y2="75" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Body -->
  <line x1="100" y1="75" x2="100" y2="130" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms -->
  <line x1="100" y1="90" x2="65" y2="120" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="90" x2="135" y2="120" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="100" y1="130" x2="75" y2="170" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="130" x2="125" y2="170" stroke="#333" stroke-width="3" stroke-linecap="round"/>
  <!-- Head tilt arrow indicating neck stretch -->
  <path d="M118 28 Q135 15 130 35" fill="none" stroke="#E53935" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="130,35 122,28 135,25" fill="#E53935"/>
</svg>
