<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Window frame -->
  <rect x="20" y="20" width="160" height="140" rx="4" ry="4" fill="#CFD8DC" stroke="#455A64" stroke-width="3"/>
  <!-- Window panes -->
  <line x1="100" y1="20" x2="100" y2="160" stroke="#455A64" stroke-width="2.5"/>
  <line x1="20" y1="90" x2="180" y2="90" stroke="#455A64" stroke-width="2.5"/>
  <!-- Sky -->
  <rect x="22" y="22" width="76" height="66" fill="#87CEEB"/>
  <rect x="102" y="22" width="76" height="66" fill="#87CEEB"/>
  <!-- Ground / grass -->
  <rect x="22" y="92" width="76" height="66" fill="#81C784"/>
  <rect x="102" y="92" width="76" height="66" fill="#81C784"/>
  <!-- Mountain in top-left -->
  <polygon points="35,88 55,40 75,88" fill="#78909C"/>
  <!-- Mountain in top-right -->
  <polygon points="110,88 135,45 160,88" fill="#78909C"/>
  <!-- Sun top-right pane -->
  <circle cx="155" cy="40" r="12" fill="#FDD835"/>
  <!-- Window title bar -->
  <rect x="20" y="160" width="160" height="18" rx="0" ry="0" fill="#607D8B"/>
  <text x="100" y="173" text-anchor="middle" font-size="10" fill="white" font-family="sans-serif">Look 20 ft away</text>
</svg>
