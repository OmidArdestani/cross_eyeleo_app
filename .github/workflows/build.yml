name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          modules: 'qtmultimedia'
      - name: Install dependencies
        run: sudo apt-get install -y libxss-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCROSSEYELEO_BUILD_APP=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Run Tests
        run: |
          cmake -B build-tests -DCROSSEYELEO_BUILD_APP=OFF -DCROSSEYELEO_BUILD_TESTS=ON
          cmake --build build-tests --parallel
          cd build-tests && QT_QPA_PLATFORM=offscreen ctest --output-on-failure

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          modules: 'qtmultimedia'
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCROSSEYELEO_BUILD_APP=ON
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Run Tests
        run: |
          cmake -B build-tests -DCROSSEYELEO_BUILD_APP=OFF -DCROSSEYELEO_BUILD_TESTS=ON
          cmake --build build-tests --config Release --parallel
          cd build-tests && ctest -C Release --output-on-failure

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt6
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          modules: 'qtmultimedia'
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DCROSSEYELEO_BUILD_APP=ON
      - name: Build
        run: cmake --build build --parallel
      - name: Run Tests
        run: |
          cmake -B build-tests -DCROSSEYELEO_BUILD_APP=OFF -DCROSSEYELEO_BUILD_TESTS=ON
          cmake --build build-tests --parallel
          cd build-tests && ctest --output-on-failure
